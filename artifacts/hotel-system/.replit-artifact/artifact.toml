kind = "web"
previewPath = "/"
title = "Luxury Hotel System"
version = "1.0.0"
id = "artifacts/hotel-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22660

[services.development]
run = "pnpm --filter @workspace/hotel-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-system", "run", "build" ]
publicDir = "artifacts/hotel-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22660"
BASE_PATH = "/"
